<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LEAP 2026 — Frame Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --dark-green: #0d3d2e;
    --mid-green:  #1a5c3e;
    --light-green:#2a7a50;
    --gold:       #c9961a;
    --gold-light: #e8b84b;
    --white:      #ffffff;
    --grey:       #a0b8a8;
    --bg:         #0a2e20;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    font-family: 'Barlow', sans-serif;
    color: var(--white);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 20px 60px;
    background-image:
      radial-gradient(ellipse 70% 50% at 100% 100%, rgba(201,150,26,.08) 0%, transparent 70%),
      radial-gradient(ellipse 60% 40% at 0% 0%, rgba(42,122,80,.15) 0%, transparent 60%);
  }

  /* ── HEADER ── */
  .site-header {
    width: 100%;
    max-width: 980px;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 0 30px;
    border-bottom: 1px solid rgba(201,150,26,.25);
    margin-bottom: 44px;
    animation: fadeDown .55s ease both;
  }
  .leap-logo-img {
    max-width: 520px;
    width: 92%;
    height: auto;
    display: block;
  }
  .site-header p {
    margin-top: 12px;
    color: var(--grey);
    font-size: .9rem;
    text-align: center;
  }

  /* ── LAYOUT ── */
  .layout {
    display: flex;
    gap: 40px;
    width: 100%;
    max-width: 980px;
    flex-wrap: wrap;
    justify-content: center;
    align-items: flex-start;
  }

  /* ── FORM PANEL ── */
  .form-panel {
    flex: 1 1 280px;
    max-width: 320px;
    animation: fadeUp .55s .1s ease both;
  }
  .form-panel h2 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: .85rem;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--gold-light);
    margin-bottom: 22px;
  }
  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-size: .73rem;
    font-weight: 600;
    letter-spacing: .09em;
    text-transform: uppercase;
    color: var(--grey);
    margin-bottom: 7px;
  }
  .field input {
    width: 100%;
    background: rgba(255,255,255,.05);
    border: 1.5px solid rgba(255,255,255,.1);
    border-radius: 8px;
    padding: 12px 15px;
    color: var(--white);
    font-family: 'Barlow', sans-serif;
    font-size: .95rem;
    outline: none;
    transition: border-color .2s, background .2s;
  }
  .field input:focus {
    border-color: var(--gold);
    background: rgba(201,150,26,.07);
  }
  .field input::placeholder { color: rgba(255,255,255,.22); }

  .photo-upload {
    width: 100%;
    background: rgba(255,255,255,.04);
    border: 2px dashed rgba(201,150,26,.35);
    border-radius: 10px;
    padding: 22px;
    text-align: center;
    cursor: pointer;
    transition: border-color .2s, background .2s;
    position: relative;
    overflow: hidden;
  }
  .photo-upload:hover {
    border-color: var(--gold);
    background: rgba(201,150,26,.07);
  }
  .photo-upload input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer;
  }
  .photo-upload .icon { font-size: 1.9rem; margin-bottom: 7px; }
  .photo-upload p { font-size: .82rem; color: var(--grey); }
  .photo-upload p strong { color: var(--gold-light); }

  .btn-generate {
    width: 100%;
    margin-top: 10px;
    background: var(--gold);
    color: var(--dark-green);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 1.05rem;
    letter-spacing: .1em;
    text-transform: uppercase;
    border: none;
    border-radius: 8px;
    padding: 15px;
    cursor: pointer;
    transition: transform .15s, background .2s;
  }
  .btn-generate:hover { background: var(--gold-light); transform: translateY(-1px); }

  /* ── PREVIEW PANEL ── */
  .preview-panel {
    flex: 1 1 420px;
    max-width: 470px;
    animation: fadeUp .55s .2s ease both;
  }
  .preview-panel h2 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: .85rem;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--gold-light);
    margin-bottom: 20px;
  }
  .canvas-wrapper {
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 28px 70px rgba(0,0,0,.7), 0 0 0 1px rgba(201,150,26,.2);
    background: var(--dark-green);
  }
  canvas { display: block; width: 100%; height: auto; }

  .btn-download {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    margin-top: 14px;
    background: transparent;
    color: var(--gold-light);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: .08em;
    text-transform: uppercase;
    border: 2px solid var(--gold);
    border-radius: 8px;
    padding: 14px;
    cursor: pointer;
    transition: background .2s, color .2s, transform .15s;
  }
  .btn-download:hover { background: var(--gold); color: var(--dark-green); transform: translateY(-1px); }
  .btn-download:disabled { opacity: .3; cursor: not-allowed; transform: none; }
  .hint {
    margin-top: 10px;
    text-align: center;
    font-size: .77rem;
    color: var(--grey);
  }

  @keyframes fadeDown {
    from { opacity:0; transform:translateY(-18px); }
    to   { opacity:1; transform:translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(18px); }
    to   { opacity:1; transform:translateY(0); }
  }
  @media (max-width:600px) {
    body { padding: 0 14px 40px; }
    .layout { flex-direction: column; }
    .form-panel, .preview-panel { max-width: 100%; }
    .leap-logo-img { max-width: 98%; }
  }
</style>
</head>

// AlexBank brand colors
const C = {
  darkGreen:  '#0d3d2e',
  midGreen:   '#1a5c3e',
  lightGreen: '#2a7a50',
  gold:       '#c9961a',
  goldLight:  '#e8b84b',
  white:      '#ffffff',
  offWhite:   'rgba(255,255,255,0.85)',
};

function liveRender() {
  if (frameReady) renderFrame();
  else drawPlaceholder();
}

function handlePhoto(e) {
    const file = e.target.files?.[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = function (event) {
        const img = new Image();

        img.onload = function () {
            userPhoto = img;
            renderFrame();
        };

        img.onerror = function (err) {
            console.error("Image failed to load", err);
            userPhoto = null;
        };

        img.src = event.target.result;
    };

    reader.readAsDataURL(file);
}

function renderFrame() {
  const name    = document.getElementById('inp-name').value.trim()    || 'Your Name';
  const faculty = document.getElementById('inp-faculty').value.trim() || 'Faculty / University';

  const canvas = document.getElementById('frame-canvas');
  const ctx = canvas.getContext('2d');
  const W = 1080, H = 1080;
  canvas.width = W; canvas.height = H;

  // ── BACKGROUND: deep dark green gradient ──
  const bg = ctx.createLinearGradient(0, 0, W, H);
  bg.addColorStop(0,   '#06271a');
  bg.addColorStop(0.5, '#0d3d2e');
  bg.addColorStop(1,   '#072015');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Subtle gold bloom bottom-right
  const bloom = ctx.createRadialGradient(W*.9, H*.85, 0, W*.9, H*.85, W*.6);
  bloom.addColorStop(0,   'rgba(201,150,26,.12)');
  bloom.addColorStop(0.4, 'rgba(42,122,80,.08)');
  bloom.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.fillStyle = bloom;
  ctx.fillRect(0, 0, W, H);

  // ── HEADER AREA: LEAP logo ──
  const leapH = 140;
  const leapW = LEAP_IMG.width > 0 ? LEAP_IMG.width * (leapH / LEAP_IMG.height) : 600;
  const leapX = 56;
  const leapY = 48;
  if (LEAP_IMG.complete && LEAP_IMG.naturalWidth > 0) {
    ctx.drawImage(LEAP_IMG, leapX, leapY, leapW, leapH);



  }

  // ── SEPARATOR LINE ──
  const sepY = leapY + leapH + 28;
  const grad1 = ctx.createLinearGradient(56, sepY, W-56, sepY);
  grad1.addColorStop(0,   C.gold);
  grad1.addColorStop(0.5, C.goldLight);
  grad1.addColorStop(1,   'rgba(201,150,26,0.1)');
  ctx.strokeStyle = grad1;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(56, sepY);
  ctx.lineTo(W-56, sepY);
  ctx.stroke();

  // ── RIGHT SIDE: Photo ──
  const pSize = 360;
  const pX    = W - 56 - pSize;
  const pY    = sepY + 30;
  const pR    = 18;

  // Gold border ring
  ctx.save();
  ctx.strokeStyle = C.gold;
  ctx.lineWidth = 4;
  roundRect(ctx, pX - 3, pY - 3, pSize + 6, pSize + 6, pR + 3);
  ctx.stroke();
  ctx.restore();

  // Photo clip
  ctx.save();
  roundRect(ctx, pX, pY, pSize, pSize, pR);
  ctx.clip();

  if (userPhoto) {
    const srcW = userPhoto.naturalWidth || userPhoto.width;
    const srcH = userPhoto.naturalHeight || userPhoto.height;
    const srcAR = srcW / srcH;
    let sw, sh, sx, sy;
    if (srcAR > 1) {
      // landscape: crop sides
      sh = srcH; sw = sh;
      sx = (srcW - sw) / 2; sy = 0;
    } else {
      // portrait or square: crop top/bottom
      sw = srcW; sh = sw;
      sx = 0; sy = (srcH - sh) / 2;
    }
    try {
      ctx.drawImage(userPhoto, sx, sy, sw, sh, pX, pY, pSize, pSize);
    } catch (err) {
      console.error("drawImage failed:", err);
    }
  } else {
    const pg = ctx.createLinearGradient(pX, pY, pX+pSize, pY+pSize);
    pg.addColorStop(0, 'rgba(26,92,62,.6)');
    pg.addColorStop(1, 'rgba(13,61,46,.9)');
    ctx.fillStyle = pg;
    ctx.fillRect(pX, pY, pSize, pSize);
    ctx.fillStyle = 'rgba(201,150,26,.3)';
    ctx.font = '110px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('👤', pX + pSize/2, pY + pSize/2);
  }
  ctx.restore();

  // Photo bottom fade
  ctx.save();
  roundRect(ctx, pX, pY, pSize, pSize, pR);
  ctx.clip();
  const pFade = ctx.createLinearGradient(pX, pY+pSize*.55, pX, pY+pSize);
  pFade.addColorStop(0, 'rgba(7,32,21,0)');
  pFade.addColorStop(1, 'rgba(7,32,21,.5)');
  ctx.fillStyle = pFade;
  ctx.fillRect(pX, pY, pSize, pSize);
  ctx.restore();

  // ── LEFT SIDE: Text content ──
  const leftW = pX - 56 - 40; // available width on left
  let curY = sepY + 40;

  // "I'M HAPPY ATTENDING" pill
  const pillW = 380;
  const pillH = 62;
  const pillX = 56;
  const pillY = curY;

  ctx.save();
  ctx.fillStyle = 'rgba(201,150,26,.15)';
  roundRect(ctx, pillX, pillY, pillW, pillH, 6);
  ctx.fill();
  ctx.strokeStyle = C.gold;
  ctx.lineWidth = 1.5;
  roundRect(ctx, pillX, pillY, pillW, pillH, 6);
  ctx.stroke();
  ctx.restore();

  ctx.fillStyle = C.goldLight;
  ctx.font = "bold 26px 'Barlow Condensed', sans-serif";
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'left';
  ctx.fillText("★  I'M HAPPY ATTENDING", pillX + 20, pillY + pillH/2);

  curY = pillY + pillH + 38;

  // "LEAP 2026" big text
  ctx.fillStyle = C.goldLight;
  ctx.font = "800 92px 'Barlow Condensed', sans-serif";
  ctx.textBaseline = 'top';
  ctx.textAlign = 'left';
  ctx.fillText('LEAP 2026', 56, curY);

  curY += 98;

  // Dates line
  ctx.fillStyle = C.white;
  ctx.font = "600 28px 'Barlow Condensed', sans-serif";
  ctx.fillText('FROM 12 JULY TO 30 JULY', 56, curY);

  curY += 54;

  // thin gold rule
  ctx.strokeStyle = 'rgba(201,150,26,.35)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(56, curY);
  ctx.lineTo(56 + leftW, curY);
  ctx.stroke();

  curY += 38;

  // NAME — big
  let fz = 78;
  ctx.font = `800 ${fz}px 'Barlow Condensed', sans-serif`;
  while (ctx.measureText(name).width > leftW - 10 && fz > 44) {
    fz -= 2;
    ctx.font = `800 ${fz}px 'Barlow Condensed', sans-serif`;
  }
  ctx.fillStyle = C.white;
  ctx.textBaseline = 'top';
  ctx.textAlign = 'left';
  ctx.fillText(name, 56, curY);

  curY += fz + 16;

  // Faculty
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.font = "400 24px Barlow, sans-serif";
  const facLines = wrapTextLines(ctx, faculty, leftW - 10, 24);
  facLines.forEach((l, i) => ctx.fillText(l, 56, curY + i * 32));

  // ── FOOTER: ALEXBANK logos + separator ──
  const footerSepY = H - 150;
  ctx.strokeStyle = 'rgba(201,150,26,.25)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(56, footerSepY);
  ctx.lineTo(W-56, footerSepY);
  ctx.stroke();

  // Draw footer logos
  // footer1 = dark background ALEXBANK banner
  // footer13 = white background ALEXBANK logo
  // We'll use footer13 (color logo on white) — draw it with a small bg rect
  const logoH = 80;

  if (FOOTER13_IMG.complete && FOOTER13_IMG.naturalWidth > 0) {
    const logoW = FOOTER13_IMG.width * (logoH / FOOTER13_IMG.height);
    const logoX = 56;
    const logoY = footerSepY + 20;

    // White pill background for the logo
    ctx.save();
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.roundRect(logoX - 12, logoY - 8, logoW + 24, logoH + 16, 8);
    ctx.fill();
    ctx.restore();

    ctx.drawImage(FOOTER13_IMG, logoX, logoY, logoW, logoH);
  }

  frameReady = true;
  document.getElementById('btn-dl').disabled = false;
}

function wrapTextLines(ctx, text, maxW, fontSize) {
  const words = text.split(' ');
  const lines = [];
  let line = '';
  for (let w of words) {
    const test = line + (line ? ' ' : '') + w;
    if (ctx.measureText(test).width > maxW && line) {
      lines.push(line); line = w;
    } else { line = test; }
  }
  if (line) lines.push(line);
  return lines;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}



function downloadFrame() {
  if (!frameReady) return;
  const canvas = document.getElementById('frame-canvas');
  try {
    const name = document.getElementById('inp-name').value.trim().replace(/\s+/g, '-') || 'leap2026';
    const a = document.createElement('a');
    a.download = `LEAP2026-${name}.png`;
    a.href = canvas.toDataURL('image/png');
    a.click();
  } catch(e) {
    alert('حصل خطأ في التنزيل. حاول تاني.');
    console.error(e);
  }
}


function drawPlaceholder() {
  const canvas = document.getElementById('frame-canvas');
  const ctx = canvas.getContext('2d');
  const W = 1080, H = 1080;
  canvas.width = W; canvas.height = H;

  const bg = ctx.createLinearGradient(0, 0, W, H);
  bg.addColorStop(0, '#06271a');
  bg.addColorStop(.5, '#0d3d2e');
  bg.addColorStop(1, '#072015');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = 'rgba(201,150,26,.5)';
  ctx.font = "bold 44px 'Barlow Condensed', sans-serif";
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'center';
  ctx.fillText('FILL IN YOUR DETAILS →', W/2, H/2 - 36);
  ctx.fillStyle = 'rgba(255,255,255,.25)';
  ctx.font = "400 24px Barlow, sans-serif";
  ctx.fillText('Your personalised card will appear here', W/2, H/2 + 36);
}

// Wait for images to load then draw placeholder
Promise.all([
  new Promise(r => { if (LEAP_IMG.complete) r(); else LEAP_IMG.onload = r; }),
  new Promise(r => { if (FOOTER13_IMG.complete) r(); else FOOTER13_IMG.onload = r; }),
]).then(() => drawPlaceholder());
